template:
  metadata:
    name: '{{ base .path }}'

  spec:
    project: default

    source:
      repoURL: https://github.com/global-cloudwork/kubernetes.git
      targetRevision: main
      path: '{{ .path }}'
      kustomize:
        buildOptions: "--enable-helm"

    destination:
      server: https://kubernetes.default.svc
      namespace: '{{ base .path }}'

    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true