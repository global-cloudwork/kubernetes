apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: application-set
  namespace: argocd

spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"

  generators:
    - git:
        repoURL: https://github.com/global-cloudwork/kubernetes.git
        revision: main
        directories:
          - path: applications/*

  template:
    metadata:
      name: '{{ .path.basename }}'

    spec:
      project: default

      source:
        repoURL: https://github.com/global-cloudwork/kubernetes.git
        targetRevision: main
        path: '{{ .path }}'
        kustomize: 
          buildOptions: "--enable-helm"

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true