apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-apps
  namespace: argocd
spec:
  goTemplate: true 
  generators:
    - git:
        repoURL: https://github.com/global-cloudwork/kubernetes.git
        revision: main
        directories:
          # 1. SCOPE RESTRICTION: Only look at folders inside the 'applications' directory
          - path: applications/*
  template:
    metadata:
      # This still extracts just the folder name (e.g., 'applications/frontend' becomes 'frontend')
      name: '{{ .path.basename }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/global-cloudwork/kubernetes.git
        targetRevision: main
        # 2. TARGET PATH: Points Argo CD to the exact subfolder to find your Kustomize files
        path: '{{ .path.path }}'
        kustomize:
          buildOptions: "--enable-helm"
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true