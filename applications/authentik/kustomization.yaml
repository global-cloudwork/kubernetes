apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: authentik
    repo: https://charts.goauthentik.io/
    namespace: authentik
    version: 2026.5.3
    releaseName: my-authentik
    valuesInline:
      authentik:
        existingSecret: "authentik-secret-key"
        existingSecretKey: "secret_key"
        error_reporting:
          enabled: false

      postgresql:
        enabled: true

      redis:
        enabled: true