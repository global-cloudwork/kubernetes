apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secret.yaml

patches:
  - path: config-map.yaml
    target:
      kind: ConfigMap
      name: argocd-cm

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    namespace: argocd
    version: 9.1.0
    releaseName: argocd
    includeCRDs: true

    valuesInline:
      configs:
        params:
          server.insecure: "true"  # must be a string — configs.params lands in a ConfigMap (map[string]string)

      server:
        service:
          type: ClusterIP
