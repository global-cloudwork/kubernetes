apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secret.yaml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    namespace: argocd
    version: 9.1.0
    releaseName: argocd
    includeCRDs: true

    valuesInline:
      configs:
        params:
          server.insecure: true # Ensured strict boolean format

      server:
        service:
          type: NodePort
          nodePortHttp: 30080
          nodePortHttps: 30443

# Bootstrap the Helm feature flag declaratively via inline patching
patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
      namespace: argocd
    patch: |-
      - op: add
        path: /data/kustomize.buildOptions
        value: "--enable-helm --load-restrictor LoadRestrictionsNone"
