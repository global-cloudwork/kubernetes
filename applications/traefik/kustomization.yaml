apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - service-account.yaml
  - cluster-role-binding.yaml
  - cluster-role.yaml

helmCharts:
  - name: traefik
    repo: https://traefik.github.io/charts
    namespace: traefik
    version: 37.1.0
    releaseName: traefik
    valuesInline:
      installCRDs: true
      deployment:
        tolerations:
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Exists"
            effect: "NoExecute"
      rbac:
        create: false
      serviceAccount:
        create: false
      providers:
        kubernetesGateway:
          enabled: true
      gateway:
        enabled: true
      service:
        type: NodePort
      ports:
        web:
          port: 80
          nodePort: 30080
          expose:
            default: true
          protocol: TCP
      websecure:
        port: 443
        nodePort: 30443
        expose:
          default: true
        protocol: TCP
## Traefik components are deployed via discrete manifests; Helm chart remains the primary deployment mechanism.
