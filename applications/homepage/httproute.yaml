apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: homepage
spec:
  parentRefs:
    - name: gateway
      namespace: gateway

  hostnames:
    - homepage.local

  rules:
    - matches:
        - path:
            type: Prefix
            value: "/"
      backendRefs:
        - name: homepage
          port: 3000
