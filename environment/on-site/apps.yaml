apps:
  - name: argocd
    type: helm
    repoPath: https://argoproj.github.io/argo-helm/argo-cd

    versioning:
      strategy: helm
      version: 9.1.0

    defaults:
      namespaceIsolation: true
      exposeIngress: false

    dependencies: []

    resources:
      cpu: null
      memory: null

    deployment:
      namespace: argocd
      releaseName: argocd
      includeCRDs: true

      service:
        type: NodePort
        ports:
          http: 30080
          https: 30443

      values:
        configs:
          params:
            server:
              insecure: true

      patches:
        - target:
            kind: ConfigMap
            name: argocd-cm
            namespace: argocd
          op: add
          path: /data/kustomize.buildOptions
          value: "--enable-helm --load-restrictor LoadRestrictionsNone"

    configSchema:
      type: object


  - name: cert-manager
    type: helm
    repoPath: https://charts.jetstack.io/cert-manager

    versioning:
      strategy: helm
      version: 1.15.0

    defaults:
      namespaceIsolation: true
      exposeIngress: false

    dependencies: []

    resources:
      cpu: null
      memory: null

    deployment:
      namespace: cert-manager
      releaseName: cert-manager

      crds:
        enabled: true

      values:
        webhook:
          securePort: 10260

        config:
          apiVersion: controller.config.cert-manager.io/v1alpha1
          kind: ControllerConfiguration
          enableGatewayAPI: true

        controller:
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - NET_BIND_SERVICE

    configSchema:
      type: object


  - name: homepage
    type: helm
    repoPath: https://unknowniq.github.io/helm-charts/homepage

    versioning:
      strategy: helm
      version: 1.8.1

    defaults:
      namespaceIsolation: true
      exposeIngress: true

    dependencies: []

    resources:
      cpu: null
      memory: null

    deployment:
      namespace: homepage
      releaseName: homepage

      service:
        type: NodePort
        ports:
          http: 30090
          https: 30443

    configSchema:
      type: object


  - name: keycloak
    type: helm
    repoPath: https://charts.bitnami.com/bitnami/keycloak

    versioning:
      strategy: helm
      version: 25.2.0

    defaults:
      namespaceIsolation: true
      exposeIngress: true

    dependencies: []

    resources:
      cpu: null
      memory: null

    deployment:
      namespace: keycloak
      releaseName: my-keycloak

      values:
        image:
          registry: docker.io
          repository: bitnami/keycloak
          tag: 26.3.3-debian-11-r0
          pullPolicy: IfNotPresent

        postgresql:
          image:
            registry: docker.io
            repository: bitnami/postgresql
            tag: 17.6.0-debian-11-r0
            pullPolicy: IfNotPresent

    configSchema:
      type: object


  - name: n8n
    type: helm
    repoPath: https://community-charts.github.io/helm-charts/n8n

    versioning:
      strategy: helm
      version: 1.15.17

    defaults:
      namespaceIsolation: true
      exposeIngress: true

    dependencies: []

    resources:
      cpu: null
      memory: null

    deployment:
      namespace: n8n
      releaseName: n8n

    configSchema:
      type: object


  - name: neo4j
    type: helm
    repoPath: https://neo4j.github.io/helm-charts/neo4j

    versioning:
      strategy: helm
      version: 2025.10.1

    defaults:
      namespaceIsolation: true
      exposeIngress: false

    dependencies: []

    resources:
      cpu: null
      memory: null

    deployment:
      namespace: neo4j
      releaseName: neo4j

      values:
        neo4j:
          name: neo4j

        volumes:
          data:
            mode: defaultStorageClass

    configSchema:
      type: object